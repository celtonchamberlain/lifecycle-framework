# Lifecycle Framework — mandatory corpus CI.
# The third, always-on, bias-free review layer (after DE self-review and PM review):
#   1. validate      — STRICT frontmatter validation of every governed .md (no --warn-only).
#   2. verify-index  — rebuild docs/INDEX.md + docs/index.json and fail on any drift.
# Scripts run by repo-relative path (scripts/*.mjs) — they are scaffolded into the repo,
# not plugin-resident (${CLAUDE_PLUGIN_ROOT} does not resolve on a GitHub Actions runner).
# Actions pinned to Node 24-compatible majors: checkout@v5, setup-node@v6.
name: Lint Frontmatter

on:
  push:
    paths:
      - '**.md'
      - 'scripts/**'
      - '.github/workflows/lint-frontmatter.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - '**.md'
      - 'scripts/**'
      - '.github/workflows/lint-frontmatter.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  validate:
    name: Validate frontmatter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Pin CI to the local toolchain (Node 24 / npm 11). npm 10 on Node 20
        # rejects lockfiles generated by npm 11 with cryptic peer-dep errors.
        node-version: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontmatter (strict)
        run: node scripts/validate-frontmatter.mjs docs .claude

  verify-index:
    name: Verify INDEX freshness
    runs-on: ubuntu-latest
    # Pin CI to the local toolchain (Node 24 / npm 11) — same rationale as
    # the validate job above.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild INDEX
        run: node scripts/build-index.mjs

      - name: Verify no drift
        run: git diff --exit-code docs/INDEX.md docs/index.json
